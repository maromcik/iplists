app_log_level: debug
all_log_level: info
#tls_cert_path: <path>/fullchain.pem
#tls_key_path: <path>/privkey.pem
#hostnames:
#   - "localhost:443"
iplist:
   country_uri: https://download.db-ip.com/free/dbip-country-lite-{year}-{month}.csv.gz
   asn_uri: https://download.db-ip.com/free/dbip-asn-lite-{year}-{month}.csv.gz
   location_path: static/lists/location.csv
   output_folder: static/lists
   download_cron: "0 0 * * * *"
blocklist:
   ipv4_url: https://blocklist
   ipv6_url: https://blocklist
   ipv4_folder: static/lists/ipv4
   ipv6_folder: static/lists/ipv6
   headers:
      Authorization: "Token xxxx"
   timeout: 10
   download_cron: "0 0 * * * *"
